<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Voice Calculator</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00f5d4">

<style>
:root{
  --bg1:#141e30;
  --bg2:#243b55;
  --glass:rgba(255,255,255,0.08);
  --text:#ffffff;
  --accent:#00f5d4;
}

.light{
  --bg1:#f5f7fa;
  --bg2:#c3cfe2;
  --glass:rgba(0,0,0,0.08);
  --text:#000;
  --accent:#0077ff;
}

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  font-family:sans-serif;
  transition:0.4s;
}

.calculator{
  backdrop-filter:blur(20px);
  background:var(--glass);
  padding:20px;
  border-radius:25px;
  width:340px;
  color:var(--text);
}

.display{
  width:100%;
  height:60px;
  font-size:24px;
  text-align:right;
  padding:10px;
  border:none;
  border-radius:12px;
  margin-bottom:10px;
  background:rgba(0,0,0,0.2);
  color:var(--text);
}

.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

button{
  padding:15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:rgba(255,255,255,0.1);
  color:var(--text);
  font-size:16px;
  transition:0.2s;
}

button:hover{ transform:translateY(-3px); }
button:active{ transform:scale(0.95); }

.equal{ background:var(--accent); color:black; }
.voice{ background:#ff9800; }
.speak{ background:#9c27b0; }

.history{
  margin-top:10px;
  max-height:70px;
  overflow:auto;
  font-size:13px;
  opacity:0.8;
}

.toggle{
  margin-top:10px;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<div class="calculator">
<input type="text" id="display" class="display" disabled>

<div class="buttons">
<button onclick="clearDisplay()">C</button>
<button onclick="append('%')">%</button>
<button onclick="append('/')">÷</button>
<button onclick="append('*')">×</button>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="append('-')">−</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button onclick="append('+')">+</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button onclick="calculate()" class="equal">=</button>

<button onclick="append('0')" style="grid-column:span 2;">0</button>
<button onclick="append('.')">.</button>
<button onclick="startListening()" class="voice">🎤</button>
<button onclick="speakAnswer()" class="speak">🔊</button>
</div>

<div class="toggle">
<button onclick="toggleTheme()">Theme</button>
<button onclick="toggleScientific()">Scientific</button>
</div>

<div id="scientific" style="display:none; margin-top:10px; display:grid; grid-template-columns:repeat(4,1fr); gap:10px;">
<button onclick="append('Math.sin(')">sin</button>
<button onclick="append('Math.cos(')">cos</button>
<button onclick="append('Math.tan(')">tan</button>
<button onclick="append('Math.sqrt(')">√</button>
</div>

<div class="history" id="history"></div>
</div>

<script>
const display=document.getElementById("display");
const historyDiv=document.getElementById("history");

function append(val){ display.value+=val; }

function clearDisplay(){ display.value=""; }

function calculate(){
  try{
    let result=eval(display.value);
    addHistory(display.value+" = "+result);
    display.value=result;
  }catch{ display.value="Error"; }
}

function addHistory(entry){
  let history=JSON.parse(localStorage.getItem("calcHistory"))||[];
  history.unshift(entry);
  localStorage.setItem("calcHistory",JSON.stringify(history.slice(0,5)));
  renderHistory();
}

function renderHistory(){
  let history=JSON.parse(localStorage.getItem("calcHistory"))||[];
  historyDiv.innerHTML=history.join("<br>");
}
renderHistory();

function toggleTheme(){ document.body.classList.toggle("light"); }

function toggleScientific(){
  let sci=document.getElementById("scientific");
  sci.style.display = sci.style.display==="none"?"grid":"none";
}

/* 🎤 Voice Input */
function startListening(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition){ alert("Not supported"); return; }

  const recognition = new SpeechRecognition();
  recognition.lang="en-US";
  recognition.start();

  recognition.onresult = function(event){
    let speech=event.results[0][0].transcript.toLowerCase();
    speech=speech.replace(/plus/g,"+")
                 .replace(/minus/g,"-")
                 .replace(/into|multiply/g,"*")
                 .replace(/divide by/g,"/")
                 .replace(/square root of/g,"Math.sqrt(");

    display.value=speech;
    calculate();
  };
}

/* 🔊 Voice Output */
function speakAnswer(){
  let msg=new SpeechSynthesisUtterance(display.value);
  speechSynthesis.speak(msg);
}

/* PWA Register */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
